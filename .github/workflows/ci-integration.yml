# SPDX-License-Identifier: MPL-2.0
#
# CI Integration — Heavy tests (Podman containers + E2E)
#
# Runs on PRs to master or on-demand (workflow_dispatch / label).
# These tests are slow and resource-intensive — not on every PR to dev.

name: CI Integration

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-integration-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------------
  # Podman integration tests — SecretService (keyring)
  # -----------------------------------------------------------------------
  keyring:
    name: SecretService integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run keyring tests (Podman)
        run: ./scripts/run-keyring-tests.sh

  # -----------------------------------------------------------------------
  # Podman integration tests — SSH
  # -----------------------------------------------------------------------
  ssh:
    name: SSH integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run SSH tests (Podman)
        run: ./scripts/run-ssh-tests.sh

  # -----------------------------------------------------------------------
  # E2E tests — WebdriverIO + tauri-driver
  # -----------------------------------------------------------------------
  e2e:
    name: E2E (WebdriverIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            xvfb

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Install pnpm
        run: npm install -g pnpm@10.28.2

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-e2e-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-e2e-

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Build (with e2e-testing feature)
        run: pnpm tauri build --no-bundle -- --features e2e-testing
        env:
          VITE_PERF_INSTRUMENTATION: "1"

      - name: Run E2E tests
        run: xvfb-run --auto-servernum pnpm wdio
