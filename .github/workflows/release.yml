# SPDX-License-Identifier: MPL-2.0
#
# Release — Build and publish GitHub Release on version tag
#
# Triggered by pushing a tag matching v* to master.
# Produces an AppImage bundle + SHA256SUMS and attaches them to a GitHub Release.

name: Release

on:
  push:
    tags:
      - "v*"

# Prevent concurrent releases
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -----------------------------------------------------------------------
  # Validate — ensure the tag matches Cargo.toml version and lives on master
  # -----------------------------------------------------------------------
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      prerelease: ${{ steps.extract.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag is on master
        run: |
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q 'origin/master'; then
            echo "::error::Tag $GITHUB_REF_NAME does not point to a commit on master."
            exit 1
          fi

      - name: Extract and verify version
        id: extract
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version\s*=' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)."
            exit 1
          fi

          # Detect pre-release (any version with a hyphen: 0.1.0-beta, 1.0.0-rc.1, etc.)
          if [[ "$TAG_VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $TAG_VERSION (prerelease: $(grep prerelease "$GITHUB_OUTPUT" | cut -d= -f2))"

  # -----------------------------------------------------------------------
  # Build — produce the AppImage bundle
  # -----------------------------------------------------------------------
  build:
    name: Build AppImage
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: rust-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: rust-release-

      - name: Install pnpm
        run: npm install -g pnpm@10.28.2

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release bundle (AppImage only)
        run: pnpm tauri build --bundles appimage

      - name: Collect artifacts and generate checksums
        id: artifacts
        run: |
          mkdir -p release

          # Copy AppImage(s) to release/
          find src-tauri/target/release/bundle -type f -name "*.AppImage" -exec cp {} release/ \;

          # Verify at least one artifact was produced
          ARTIFACT_COUNT=$(find release -type f -name "*.AppImage" | wc -l)
          if [[ "$ARTIFACT_COUNT" -eq 0 ]]; then
            echo "::error::No AppImage found in build output."
            exit 1
          fi

          # Generate SHA256SUMS
          (cd release && sha256sum -- *.AppImage | sort -k2 > SHA256SUMS)

          echo "Found $ARTIFACT_COUNT artifact(s):"
          ls -lh release/
          echo ""
          echo "SHA256SUMS:"
          cat release/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release/
          retention-days: 5

  # -----------------------------------------------------------------------
  # Publish — create the GitHub Release with artifacts
  # -----------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release/

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"

          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z...]" to the next "## [" or end of file
          NOTES=$(sed -n "/^## \[$VERSION\]/,/^## \[/{ /^## \[$VERSION\]/d; /^## \[/d; p; }" CHANGELOG.md)

          if [[ -z "$NOTES" ]]; then
            NOTES="Release $VERSION"
          fi

          # Write to file (multi-line output via GITHUB_OUTPUT is fragile)
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PRERELEASE="${{ needs.validate.outputs.prerelease }}"

          FLAGS=()
          if [[ "$PRERELEASE" == "true" ]]; then
            FLAGS+=(--prerelease)
          fi

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file release-notes.md \
            "${FLAGS[@]}" \
            release/*
