# Nextest configuration for TauTerm Rust tests.
# https://nexte.st/docs/configuration/

[profile.default]
# Retry flaky tests once before marking them as failed.
retries = 1
# Per-test timeout: PTY and SSH integration tests can be slow.
slow-timeout = { period = "30s", terminate-after = 2 }
# Fail-fast off: collect all failures for complete CI reports.
fail-fast = false

[profile.ci]
# Stricter profile for CI: no retries, faster timeout.
retries = 0
slow-timeout = { period = "20s", terminate-after = 1 }
fail-fast = false

[profile.keyring]
# Profile for SecretService integration tests.
# Tests share a single daemon — parallelism would cause race conditions.
test-threads = 1
slow-timeout = { period = "60s", terminate-after = 2 }
# Run all tests even if one fails, to get a complete picture.
fail-fast = false

[profile.ssh]
# Profile for SSH integration tests (require a live OpenSSH container).
# Tests connect to the same sshd instance — bounded parallelism to avoid
# exhausting the server's connection limit during rapid parallel test runs.
test-threads = 4
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = false
